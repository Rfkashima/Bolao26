<!doctype html>
<html lang="pt-BR">
<head>

  <meta name="description" content="Bolão Copa 2026" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">

      <div>
        <p class="eyebrow">Copa do Mundo 2026</p>
        <h1 id="site-title">Bolão Copa 2026</h1>

      <button type="button" data-view="oficial">Oficial</button>
      <button type="button" data-view="palpites">Palpites</button>
    </nav>

  <main id="app" class="container"></main>

  <footer class="footer">
    <span>Bolão Copa 2026</span>
    <span>Placar exato 3 · Resultado 1</span>

  <script src="data.js"></script>

</html>
