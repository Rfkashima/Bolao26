<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bolão Copa 2026</title>
  <meta name="description" content="Página pública do Bolão da Copa do Mundo 2026." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="hero-card">
      <div class="hero-main">
        <p class="eyebrow">Copa do Mundo 2026</p>
        <h1 id="site-title">Bolão Copa 2026</h1>
        <p class="subtitle">Palpites, ranking, jogos, grupos, regras e premiação em uma página só.</p>
      </div>
      <div class="hero-info">
        <span class="status-pill" id="backend-status">Modo local</span>
        <span>Placar exato: <strong>3 pts</strong></span>
        <span>Resultado correto: <strong>1 pt</strong></span>
        <span>Fecha: <strong>2h antes da rodada</strong></span>
      </div>
    </div>
  </header>

  <main id="app" class="container"></main>

  <footer class="footer">
    <span>Bolão Copa 2026</span>
    <span>Ranking e palpites atualizados pelo site.</span>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
